[package]
name = "helm"
version = "0.1.0"
edition = "2021"
description = "Experimental P2P protocol for AI and Human agent communication"
license = "MIT"

[dependencies]
# P2P networking
libp2p = { version = "0.54", features = [
    "tokio",
    "gossipsub",
    "kad",
    "noise",
    "tcp",
    "yamux",
    "identify",
    "mdns",
] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# Cryptography
ed25519-dalek = "2"
rand = "0.8"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
strip = true
